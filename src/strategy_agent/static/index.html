<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TradeX</title>
    <link rel="stylesheet" href="/static/styles.css?v=49" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="top-left">
          <div class="brand">TradeX</div>
          <button id="chatTabBtn" class="top-tab active" type="button">Chat</button>
          <button id="traceTabBtn" class="top-tab" type="button">Trace</button>
        </div>
        <div class="top-actions">
          <span class="user-name">weichyy</span>
          <button class="btn btn-ghost">退出登录</button>
          <button id="clearChatBtn" class="btn btn-primary">新建会话</button>
        </div>
      </header>

      <main class="layout">
        <aside class="sidebar">
          <div class="sidebar-head">
            <h2>对话线程</h2>
            <button id="exampleBtn" class="btn btn-ghost">归档旧会话</button>
          </div>
          <div class="thread-list">
            <button class="thread-item active" data-session-id="thread-macd-510300" data-query="对于沪深300ETF，MACD 日线金叉买入、死叉卖出，每年的平均收益是多少？">
              <span>MACD 金叉死叉</span>
            </button>
            <button class="thread-item" data-session-id="thread-macd-300750" data-query="帮我验证一个策略：阳光电源按照 MACD（日线）金叉买入、死叉卖出，回测一下效果。">
              <span>阳光电源 MACD</span>
            </button>
            <button class="thread-item" data-session-id="thread-ma-510300" data-query="MA10 和 MA60 均线交叉策略在沪深300ETF上效果怎么样？">
              <span>MA10 / MA60 均线交叉</span>
            </button>
            <button class="thread-item" data-session-id="thread-rsi-chuangye" data-query="RSI 超买超卖策略在创业板ETF上表现如何？">
              <span>RSI 超买超卖</span>
            </button>
            <button class="thread-item" data-session-id="thread-drawdown-510300" data-query="沪深300ETF 回撤反弹策略回测一下。">
              <span>沪深300ETF 回撤反弹</span>
            </button>
            <button class="thread-item" data-session-id="thread-ma-securities" data-query="证券ETF 均线择时策略效果怎么样？">
              <span>证券ETF 均线择时</span>
            </button>
            <button class="thread-item" data-session-id="thread-drawdown-500" data-query="中证500ETF 回撤反弹策略回测。">
              <span>中证500ETF 回撤反弹</span>
            </button>
            <button class="thread-item" data-session-id="thread-macd-dividend" data-query="红利ETF MACD 策略回测一下。">
              <span>红利ETF MACD</span>
            </button>
            <button class="thread-item" data-session-id="thread-rsi-cyb-etf" data-query="创业板ETF RSI 策略表现如何？">
              <span>创业板ETF RSI</span>
            </button>
          </div>
        </aside>

        <section class="workspace">
          <div id="chatStrip" class="chat-strip hidden">
            <div id="chatTimeline" class="chat-timeline"></div>
          </div>
          <div id="traceBoard" class="trace-board hidden">
            <div class="trace-board-head">
              <div>
                <div class="trace-eyebrow">Agent Observability</div>
                <h2>执行轨迹</h2>
              </div>
              <div id="traceTokenSummary" class="trace-token-summary">tokens 0</div>
            </div>
            <div id="traceStats" class="trace-stats"></div>
            <div id="traceTurns" class="trace-turns"></div>
          </div>
          <article class="research-doc">
            <div class="doc-head">
              <div id="resultBadge" class="badge">未运行</div>
              <div id="statusLine" class="status-line">等待输入</div>
            </div>

            <div id="clarifyPanel" class="clarify-panel hidden">
              <div class="section-title">需要补充信息</div>
              <div id="clarifyQuestion" class="clarify-question"></div>
              <div id="clarifyMissing" class="clarify-missing"></div>
            </div>

            <div id="summaryBox" class="summary-box"></div>
            <div id="insightGrid" class="insight-grid"></div>
            <div id="metricGrid" class="metric-grid"></div>
            <div id="chartWrap" class="chart-wrap hidden">
              <svg id="equityChart" viewBox="0 0 760 280" preserveAspectRatio="none"></svg>
            </div>
            <div id="riskBox" class="risk-box"></div>
            <details id="yearlyWrap" class="table-wrap hidden">
              <summary>年度收益</summary>
              <table id="yearlyTable" class="table">
                <thead><tr><th>年份</th><th>收益</th></tr></thead>
                <tbody></tbody>
              </table>
            </details>
          </article>

          <form class="composer" onsubmit="return false;">
            <textarea id="queryInput" class="query-input" rows="3" placeholder="例如：帮我验证一个策略，每月买入成交额最大的20只股票，每月调仓一次"></textarea>
            <button id="runBtn" class="send-btn" aria-label="发送消息" title="发送消息">↑</button>
          </form>
        </section>
      </main>
    </div>
    <script type="module" src="/static/app.js?v=49"></script>
  </body>
</html>
